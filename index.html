<!DOCTYPE html>
<html>
<head>
  <style>
    /* Set the overall background of the page to black */
    body {
      background-color: black;
    }
    .sn {
      display: grid;
      gap: 10px;
      color: white;
      font-size: 30px;
      justify-items: center; /* Centers the serial numbers in their 75px columns */
      align-items: center; 
      margin-bottom: 10px; /* Small space between numbers and the grid */
    }
    .sn div {
      display: flex;
      transform: rotate(-90deg);
      user-select: none;
      justify-content: center;
      align-items: center;
    }

    /* Styling for the main grid container */
    .container {
      display: grid;
      gap: 10px; 
      grid-auto-flow: column; 
      justify-items: center; /* Centers the 55px circles inside the 75px columns */
      align-items: center;
    }

    /* Styling for the individual grid cells */
    .container div {
      border-radius: 50%; 
      background-color: grey; 
      width: 55px;
      height: 55px;
      display: flex;
      justify-content: center; 
      align-items: center; 
      color: white; 
      font-size: 30px;
      cursor: pointer; 
      user-select: none; 
      transform: rotate(-90deg); 
    }
  </style>
</head>

<body>
  <div class="sn"></div>
  <div class="container"></div>

  <script>
    const container = document.querySelector(".container");
    const sn = document.querySelector(".sn");

    let color_coding = JSON.parse(localStorage.getItem("color_coding")) || {};
    let noOfElementsInRow = 25;
    let noOfElementsInColumn = 6;
    
    container.style.gridTemplateRows = `repeat(${noOfElementsInRow}, 75px)`;
    
    // Set matching fixed column widths for both grids so they align perfectly
    container.style.gridTemplateColumns = `repeat(${noOfElementsInColumn}, 75px)`;
    sn.style.gridTemplateColumns = `repeat(${noOfElementsInColumn}, 75px)`;

    for (let i = 1; i <= noOfElementsInColumn * noOfElementsInRow; i++) {
        
        const cell = document.createElement("div");
        cell.className = "cell";
        
        cell.textContent = ((i - 1) % noOfElementsInRow) + 1;
        
        if (cell.textContent == "1") {
            const snCell = document.createElement("div");
            snCell.className = "snCell";
            // More robust math for finding the current column number
            snCell.textContent = Math.floor((i - 1) / noOfElementsInRow) + 1;
            sn.appendChild(snCell);
        }        
        
        cell.style.backgroundColor = color_coding[i] || "grey";

        cell.onclick = function () {
            if (cell.style.backgroundColor === "green") {
                if (!confirm("Are you sure you want to change this cell back to grey?")) {
                    return; 
                }
                cell.style.backgroundColor = "grey";
                
                // Deleting instead of setting to 'grey' to save webhook string size
                delete color_coding[i]; 
            } else {
                cell.style.backgroundColor = "green";
                color_coding[i] = "green";
            }

            localStorage.setItem("color_coding", JSON.stringify(color_coding));
            
            fetch("https://trigger.macrodroid.com/b7778721-f32d-4644-8b12-08844ab6ef9e/Prayed_places_data", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    color_coding: color_coding
                })
            })
            .then(response => console.log("Sent successfully")) 
            .catch(error => console.error("Error sending data:", error)); 
        };

        container.appendChild(cell);
    }
    
    window.addEventListener('online', function() {
        console.log("Internet restored. Syncing data to MacroDroid...");
        
        let current_data = JSON.parse(localStorage.getItem("color_coding")) || {};

        fetch("https://trigger.macrodroid.com/b7778721-f32d-4644-8b12-08844ab6ef9e/Prayed_places_data", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                color_coding: current_data
            })
        })
        .then(response => console.log("Offline data synced successfully!"))
        .catch(error => console.error("Error syncing data:", error));
    });

  </script>
</body>
</html>
